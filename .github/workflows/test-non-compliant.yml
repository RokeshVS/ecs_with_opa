name: Test Non-Compliant Template

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'

jobs:
  test-non-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Non-Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-non-compliant.yaml"
          echo "Expected: FAIL (should have violations)"
          echo "=================================================="
          echo ""
          
          # Run OPA evaluation and capture output
          OUTPUT=$(./opa eval -d opa-policies/ -i cloudformation-templates/ecs-non-compliant.yaml "data.ecs_security" 2>&1)
          EXIT_CODE=$?
          
          echo "OPA Evaluation Output:"
          echo "--------------------"
          echo "$OUTPUT"
          echo "--------------------"
          echo ""
          
          # Check for violations
          if echo "$OUTPUT" | grep -q '"deny"' && echo "$OUTPUT" | grep -q '\['; then
            echo "✅ PASSED: Correctly detected policy violations:"
            echo ""
            # Extract and display violations
            VIOLATIONS=$(echo "$OUTPUT" | grep -oP '"deny":\s*\[.*?\]' | head -1)
            echo "Violations Found: $VIOLATIONS"
            echo ""
            exit 0
          else
            echo "❌ FAILED: Should have detected violations but didn't"
            echo "Full output:"
            echo "$OUTPUT"
            exit 1
          fi
