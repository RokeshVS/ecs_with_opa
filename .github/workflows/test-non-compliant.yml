name: Test Non-Compliant Template

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'

jobs:
  test-non-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Non-Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-non-compliant.yaml"
          echo "Expected: FAIL (should have violations)"
          echo "=================================================="
          echo ""
          
          # Check if file exists
          if [ ! -f "cloudformation-templates/ecs-non-compliant.yaml" ]; then
            echo "❌ ERROR: File not found - cloudformation-templates/ecs-non-compliant.yaml"
            exit 1
          fi
          
          echo "Running OPA evaluation..."
          echo ""
          
          # Run OPA evaluation and capture output
          if ./opa eval -d opa-policies/ -i cloudformation-templates/ecs-non-compliant.yaml "data.ecs_security" 2>&1 | tee /tmp/opa-output.txt; then
            echo ""
            echo "OPA Command executed successfully"
            echo ""
            
            # Check for violations
            VIOLATIONS=$(grep -oP '"deny":\s*\[.*?\]' /tmp/opa-output.txt 2>/dev/null || echo "")
            
            if [ ! -z "$VIOLATIONS" ] && ! echo "$VIOLATIONS" | grep -q '"\[\]"'; then
              echo "✅ PASSED: Correctly detected policy violations"
              echo ""
              echo "Violations Found:"
              echo "$VIOLATIONS"
              exit 0
            else
              echo "❌ FAILED: Should have detected violations but didn't"
              cat /tmp/opa-output.txt
              exit 1
            fi
          else
            echo "❌ ERROR: OPA evaluation failed"
            echo ""
            echo "Output:"
            cat /tmp/opa-output.txt 2>/dev/null || echo "No output captured"
            exit 1
          fi
