name: Test Non-Compliant Template

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'

jobs:
  test-non-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Non-Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-non-compliant.yaml"
          echo "Expected: FAIL (should have violations)"
          echo "=================================================="
          echo ""
          
          # Run OPA evaluation
          ./opa eval -d opa-policies/ -i cloudformation-templates/ecs-non-compliant.yaml "data.ecs_security" > /tmp/opa-result.json 2>&1
          
          echo "OPA Result:"
          echo "---"
          cat /tmp/opa-result.json
          echo "---"
          echo ""
          
          # Check if deny has violations (deny: [something] means violations found)
          # We want violations to EXIST for non-compliant template
          if grep -q '"deny":\s*\[\s*\]' /tmp/opa-result.json; then
            echo "❌ FAILED: ecs-non-compliant.yaml should have violations but has none"
            exit 1
          elif grep -q '"deny":' /tmp/opa-result.json; then
            echo "✅ PASSED: ecs-non-compliant.yaml correctly detected policy violations"
            exit 0
          else
            echo "❌ FAILED: Could not parse OPA result"
            exit 1
          fi
