name: Test Non-Compliant Template

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-non-compliant.yaml'

jobs:
  test-non-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Non-Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-non-compliant.yaml"
          echo "Expected: FAIL (should have violations)"
          echo "=================================================="
          echo ""
          
          # Run OPA evaluation
          ./opa eval -d opa-policies/ -i cloudformation-templates/ecs-non-compliant.yaml "data.ecs_security" > /tmp/opa-result.txt 2>&1
          OPA_EXIT=$?
          
          echo "Policy Validation Report:"
          echo "---"
          cat /tmp/opa-result.txt
          echo "---"
          echo ""
          
          # Check if deny has violations (deny: [...] means violations exist)
          if grep -E 'deny:\s*\[' /tmp/opa-result.txt > /dev/null && ! grep -E 'deny:\s*\[\]' /tmp/opa-result.txt > /dev/null; then
            echo "✅ PASSED: Non-compliant template correctly detected violations"
            exit 0
          elif grep -E 'deny:\s*\[\]' /tmp/opa-result.txt > /dev/null; then
            echo "❌ FAILED: Should have violations but none detected"
            exit 1
          else
            echo "❌ FAILED: Should have violations but none detected"
            exit 1
          fi
