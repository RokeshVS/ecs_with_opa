name: Test Compliant Template 

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'

jobs:
  test-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-compliant.yaml"
          echo "Expected: PASS (no violations)"
          echo "=================================================="
          echo ""
          
          # Check if file exists
          if [ ! -f "cloudformation-templates/ecs-compliant.yaml" ]; then
            echo "❌ ERROR: File not found - cloudformation-templates/ecs-compliant.yaml"
            exit 1
          fi
          
          echo "Running OPA evaluation..."
          echo ""
          
          # Run OPA evaluation and capture both output and error
          if ./opa eval -d opa-policies/ -i cloudformation-templates/ecs-compliant.yaml "data.ecs_security" 2>&1 | tee /tmp/opa-output.txt; then
            echo ""
            echo "OPA Command executed successfully"
            echo ""
            
            # Extract violations
            if grep -q '"deny":\s*\[\s*\]' /tmp/opa-output.txt; then
              echo "✅ PASSED: ecs-compliant.yaml passed all policies"
              echo "  - No policy violations detected"
              echo "  - All security requirements met"
              exit 0
            else
              VIOLATIONS=$(grep -oP '"deny":\s*\[.*?\]' /tmp/opa-output.txt 2>/dev/null || echo "")
              if [ ! -z "$VIOLATIONS" ]; then
                echo "❌ FAILED: Found policy violations:"
                echo "$VIOLATIONS"
                exit 1
              else
                echo "✅ PASSED: ecs-compliant.yaml passed all policies"
                exit 0
              fi
            fi
          else
            echo "❌ ERROR: OPA evaluation failed"
            echo ""
            echo "Output:"
            cat /tmp/opa-output.txt 2>/dev/null || echo "No output captured"
            exit 1
          fi
