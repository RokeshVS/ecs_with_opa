name: Test Compliant Template 

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'

jobs:
  test-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-compliant.yaml"
          echo "Expected: PASS (no violations)"
          echo "=================================================="
          echo ""
          
          # Run OPA evaluation
          ./opa eval -d opa-policies/ -i cloudformation-templates/ecs-compliant.yaml "data.ecs_security" > /tmp/opa-result.txt 2>&1
          OPA_EXIT=$?
          
          echo "Policy Validation Report:"
          echo "---"
          cat /tmp/opa-result.txt
          echo "---"
          echo ""
          
          # Check exit code and output
          if [ $OPA_EXIT -ne 0 ]; then
            echo "❌ FAILED: OPA evaluation failed"
            exit 1
          fi
          
          # Check if deny has any violations (deny: [] means no violations, deny: [...] means violations)
          if grep -E 'deny:\s*\[\]' /tmp/opa-result.txt > /dev/null; then
            echo "✅ PASSED: ecs-compliant.yaml passed all policies"
            echo "  - No policy violations detected"
            echo "  - All security requirements met"
            exit 0
          elif grep -E 'deny:\s*\[' /tmp/opa-result.txt > /dev/null; then
            echo "❌ FAILED: Template has policy violations"
            exit 1
          else
            echo "✅ PASSED: ecs-compliant.yaml passed all policies"
            exit 0
          fi
