name: Test Compliant Template

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'

jobs:
  test-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-compliant.yaml"
          echo "Expected: PASS (no violations)"
          echo "=================================================="
          echo ""
          
          # Run OPA evaluation and capture output
          OUTPUT=$(./opa eval -d opa-policies/ -i cloudformation-templates/ecs-compliant.yaml "data.ecs_security" 2>&1)
          EXIT_CODE=$?
          
          echo "OPA Evaluation Output:"
          echo "--------------------"
          echo "$OUTPUT"
          echo "--------------------"
          echo ""
          
          # Check for violations
          if echo "$OUTPUT" | grep -q '"deny"'; then
            VIOLATIONS=$(echo "$OUTPUT" | grep -oP '"deny".*' | head -20)
            echo "❌ FAILED: Found policy violations:"
            echo "$VIOLATIONS"
            echo ""
            exit 1
          fi
          
          # Check if allow is true
          if echo "$OUTPUT" | grep -q '"allow":true'; then
            echo "✅ PASSED: ecs-compliant.yaml passed all policies"
            echo "  - No policy violations detected"
            echo "  - All security requirements met"
            exit 0
          else
            echo "❌ FAILED: ecs-compliant.yaml should pass but has issues"
            echo "Full output:"
            echo "$OUTPUT"
            exit 1
          fi
