name: Test Compliant Template 

on:
  pull_request:
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'
      - 'opa-policies/**'
  push:
    branches:
      - main
    paths:
      - 'cloudformation-templates/ecs-compliant.yaml'

jobs:
  test-compliant:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          ./opa version
      
      - name: Validate Compliant Template
        run: |
          echo "=================================================="
          echo "Testing: ecs-compliant.yaml"
          echo "Expected: PASS (no violations)"
          echo "=================================================="
          echo ""
          
          # Run OPA evaluation
          ./opa eval -d opa-policies/ -i cloudformation-templates/ecs-compliant.yaml "data.ecs_security" > /tmp/opa-result.json 2>&1
          
          echo "OPA Result:"
          echo "---"
          cat /tmp/opa-result.json
          echo "---"
          echo ""
          
          # Check if deny is empty
          if grep -q '"deny":\s*\[\s*\]' /tmp/opa-result.json; then
            echo "✅ PASSED: ecs-compliant.yaml has no violations"
            exit 0
          else
            echo "❌ FAILED: ecs-compliant.yaml has policy violations"
            exit 1
          fi
